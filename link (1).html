    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
            background-size: 600% 600%;
            animation: bgMove 18s ease infinite;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 22px;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: 22px;
            background: linear-gradient(135deg, #7efcff, transparent, #b388ff);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        h2 {
            color: #7efcff;
            margin-bottom: 16px;
        }

        h2::after {
            content: "";
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, #7efcff, #b388ff);
            display: block;
            margin: 12px auto 0;
            border-radius: 20px;
        }

        .intro {
            font-size: 16px;
            line-height: 1.8;
            color: #e0f2f1;
            margin-top: 22px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 32px;
            background: linear-gradient(90deg, #7efcff, #b388ff);
            color: #0f2027;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.35);
        }

        footer {
            margin-top: 26px;
            font-size: 14px;
            color: #cfd8dc;
        }
    </style>
</head>
